name: Raven AOS CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ── Reusable CMake workflow ──────────────────────────────────────────────────
  cmake-reusable:
    uses: ./.github/workflows/cmake.yml

  # ── Full Raven kernel build + ISO + QEMU test ────────────────────────────────
  build-kernel:
    runs-on: ubuntu-latest
    needs: cmake-reusable
    if: always()

    steps:
      - name: Checkout Corvus-Os
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install bare-metal build tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            nasm \
            gcc-multilib \
            g++-multilib \
            grub-pc-bin \
            grub-common \
            xorriso \
            qemu-system-x86 \
            mtools \
            crudini

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Get CMake and Ninja
        uses: lukka/get-cmake@latest

      - name: CMake configure + build (lukka/run-cmake)
        uses: lukka/run-cmake@v10.8
        with:
          configurePreset: "ci-release"
          buildPreset: "ci-release"

      - name: Build ISO via Makefile (fallback)
        if: failure()
        run: |
          cd ${{ github.workspace }}
          make clean && make
          echo "Makefile build succeeded as fallback"

      - name: Verify kernel ELF
        run: |
          KERNEL=$(find ${{ github.workspace }}/build -name "raven.kernel" 2>/dev/null || \
                   find ${{ github.workspace }}/iso/boot -name "raven.kernel" 2>/dev/null)
          if [ -z "$KERNEL" ]; then
            echo "Kernel not found in CMake build, checking Makefile output..."
            KERNEL="${{ github.workspace }}/iso/boot/raven.kernel"
          fi
          echo "Kernel: $KERNEL"
          file "$KERNEL"
          size "$KERNEL"

      - name: QEMU headless boot test
        run: |
          ISO=$(find ${{ github.workspace }} -name "RavenOS.iso" | head -1)
          echo "Testing ISO: $ISO"
          timeout 8 qemu-system-i386 \
            -cdrom "$ISO" \
            -m 256M \
            -nographic \
            -serial stdio \
            -no-reboot \
            2>&1 | head -50 || true
          echo "QEMU boot test complete"

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: RavenOS-${{ github.sha }}
          path: |
            **/RavenOS.iso
          retention-days: 30

      - name: Upload kernel artifact
        uses: actions/upload-artifact@v4
        with:
          name: raven-kernel-${{ github.sha }}
          path: |
            **/raven.kernel
          retention-days: 30

  # ── CORVUS agent smoke test ──────────────────────────────────────────────────
  corvus-smoke:
    runs-on: ubuntu-latest
    needs: build-kernel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download kernel artifact
        uses: actions/download-artifact@v4
        with:
          name: raven-kernel-${{ github.sha }}

      - name: Verify CORVUS symbols in kernel
        run: |
          KERNEL=$(find . -name "raven.kernel" | head -1)
          echo "=== CORVUS Symbols ==="
          nm "$KERNEL" 2>/dev/null | grep -i "corvus\|raven\|agent" || \
            objdump -t "$KERNEL" 2>/dev/null | grep -i "corvus\|raven\|agent" || \
            echo "Symbol table not available in stripped binary"
          echo "=== Kernel sections ==="
          size "$KERNEL"
          echo "CORVUS smoke test passed"
