set timeout=3
set default=0

# The boot screen is warm amber — BUBO's color — before the kernel loads
set color_normal=yellow/black
set color_highlight=white/black

menuentry "BUBO OS — Athena's Owl" {
    echo "BUBO online. I'm here."
    multiboot2 /boot/bubo.kernel
    boot
}

menuentry "BUBO OS — Safe Mode (nomodeset)" {
    echo "BUBO online. Safe mode."
    multiboot2 /boot/bubo.kernel nomodeset
    boot
}

menuentry "BUBO OS — VMX Debug Mode" {
    echo "BUBO online. VMX debug enabled."
    multiboot2 /boot/bubo.kernel vmx_debug
    boot
}
