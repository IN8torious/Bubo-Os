set timeout=3
set default=0

set color_normal=red/black
set color_highlight=white/black

insmod all_video
insmod gfxterm
insmod vbe
insmod vga
insmod video_bochs
insmod video_cirrus
set gfxmode=auto
set gfxpayload=keep
terminal_output gfxterm

menuentry "BUBO OS — Six Paths Online" {
    echo "BUBO online. I'm here. NO MAS DISADVANTAGED."
    set gfxpayload=keep
    multiboot2 /boot/bubo.kernel console=ttyS0
    boot
}

menuentry "BUBO OS — Safe Mode" {
    echo "BUBO online. Safe mode. Still here."
    set gfxpayload=text
    multiboot2 /boot/bubo.kernel nomodeset
    boot
}

menuentry "BUBO OS — RAVEN Debug Mode" {
    echo "BUBO online. RAVEN watching everything."
    multiboot2 /boot/bubo.kernel vmx_debug
    boot
}
